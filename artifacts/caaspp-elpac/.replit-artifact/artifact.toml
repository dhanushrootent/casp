kind = "web"
previewPath = "/"
title = "CAASPP & ELPAC Assessment Platform"
version = "1.0.0"
id = "artifacts/caaspp-elpac"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21293
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/caaspp-elpac run dev"

[services.env]
PORT = "21293"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/caaspp-elpac", "run", "build"]
publicDir = "artifacts/caaspp-elpac/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
